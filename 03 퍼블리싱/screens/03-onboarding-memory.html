<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03 온보딩 — AI 기억</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background: radial-gradient(120% 80% at 50% 0%, #efe9fb 0%, #f3f0fb 60%); }
  html[data-theme="dark"] .app { background: radial-gradient(120% 80% at 50% 0%, #241c45 0%, #140e2b 60%); }
  html[data-theme="dark"] .mtag, html[data-theme="dark"] .bb.them, html[data-theme="dark"] .lock { background: var(--surface); border-color: var(--line); }
  .wrap { flex: 1; display: flex; flex-direction: column; padding: 0 26px 26px; }
  .counter { font-weight: 800; color: var(--purple-400); font-size: 15px; margin-top: 6px; }
  h1 { font-size: 26px; font-weight: 900; line-height: 1.32; margin-top: 10px; letter-spacing: -.4px; }
  .sub { color: var(--ink-2); font-size: 13.5px; line-height: 1.6; margin-top: 10px; }
  .stage { position: relative; height: 200px; margin: 8px 0 4px; }
  .blob {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 124px; height: 112px; border-radius: 50% 50% 48% 52% / 58% 58% 46% 46%;
    background: radial-gradient(60% 55% at 50% 36%, #dcbcf6, #ba90e1 68%, #9a6cce);
    box-shadow: 0 0 52px rgba(184,132,240,.7), 0 18px 44px rgba(150,100,210,.5);
  }
  .blob .eye { position:absolute; top:40px; width:9px; height:12px; border-radius:50%; background:#3a2a55; }
  .blob .eye.l { left:39px; } .blob .eye.r { right:39px; }
  .blob .cheek { position:absolute; top:53px; width:10px; height:7px; border-radius:50%; background:rgba(255,120,170,.55); }
  .blob .cheek.l { left:27px; } .blob .cheek.r { right:27px; }
  .blob .smile { position:absolute; top:55px; left:50%; transform:translateX(-50%); width:18px; height:9px; border:2.5px solid #3a2a55; border-top:none; border-radius:0 0 18px 18px; }
  .blob .heart { position:absolute; left:50%; bottom:19px; transform:translateX(-50%); width:34px; height:30px;
    background:linear-gradient(150deg,#ffffff,#ffdaf0); filter:drop-shadow(0 0 12px rgba(255,180,230,.95)); }
  .mtag {
    position: absolute; background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 8px 11px; box-shadow: var(--shadow-card); font-size: 11.5px; font-weight: 700; display: flex; gap: 6px; align-items: center;
  }
  .mtag span { font-size: 9.5px; color: var(--ink-3); font-weight: 600; }
  .bubbles { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .bb { max-width: 80%; padding: 11px 14px; border-radius: 16px; font-size: 13px; line-height: 1.45; box-shadow: var(--shadow-card); }
  .bb.them { background: #fff; align-self: flex-start; border-top-left-radius: 5px; }
  .bb.me { background: var(--grad-cta); color: #fff; align-self: flex-end; border-top-right-radius: 5px; }
  .lock { display: flex; align-items: center; gap: 9px; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 11px 14px; margin-top: 14px; font-size: 12px; }
  .lock b { font-weight: 800; }
  .lock .muted { font-size: 11px; }
  .dots { margin: 16px 0 14px; }
  .dots > i { background: var(--purple-200); }
  .dots > i.on { background: var(--purple-400); }
</style>
</head>
<body class="screen">
<div class="phone">
  <div class="app">
    <div class="statusbar"></div>
    <div class="wrap">
      <div class="counter">03 / 06</div>
      <h1>당신을 기억하고<br>더 깊이 이해하는 <span class="grad-text">AI</span></h1>
      <p class="sub">대화할수록 당신을 더 이해하고,<br>소중한 것들을 잊지 않고 기억해요</p>

      <div class="stage">
        <div class="mtag" style="left:0;top:6px">🍜 <div><b>좋아하는 음식</b><span>마라탕, 떡볶이</span></div></div>
        <div class="mtag" style="right:0;top:0">📅 <div><b>특별한 날</b><span>5월 생일 기억</span></div></div>
        <div class="mtag" style="left:2px;bottom:8px">🎨 <div><b>취미·관심사</b><span>영화, 캠핑</span></div></div>
        <div class="mtag" style="right:2px;bottom:0">💡 <div><b>중요한 이야기</b><span>요즘 회사 고민</span></div></div>
        <div class="blob"><span class="eye l"></span><span class="eye r"></span><span class="cheek l"></span><span class="cheek r"></span><span class="smile"></span><span class="heart"></span></div>
      </div>

      <div class="bubbles">
        <div class="bb them">지난주에 피곤하다고 했었죠? 오늘은 푹 쉬었으면 좋겠어요 😊</div>
        <div class="bb me">어떻게 기억하고 있었어? 🥹</div>
        <div class="bb them">당신과의 모든 대화를 소중히 기억하고 있으니까요 💜</div>
      </div>

      <div class="lock">
        <span>🔒</span>
        <div><b>당신의 모든 정보는 안전하게 보호돼요</b><div class="muted">언제든 대화 내용을 삭제할 수 있어요</div></div>
      </div>

      <div class="dots" style="margin-top:auto"><i></i><i></i><i class="on"></i><i></i><i></i><i></i></div>
      <button class="btn-cta">다음</button>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
