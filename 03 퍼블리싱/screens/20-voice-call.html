<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 음성통화</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background: linear-gradient(180deg,#2a2138 0%,#3a2c44 40%,#5a3a4a 100%); color:#fff; }
  .bgphoto { position:absolute; inset:0; background:
      linear-gradient(180deg, rgba(20,14,30,.45) 0%, rgba(20,14,30,.22) 34%, rgba(20,14,30,.9) 100%),
      url("../assets/img/model-night.jpg") center 20% / cover no-repeat;
  }
  .layer { position:relative; z-index:2; flex:1; display:flex; flex-direction:column; padding: 0 18px 18px; }
  .topbanner { display:flex; align-items:center; gap:9px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.16); backdrop-filter:blur(10px); border-radius:14px; padding:9px 12px; }
  .topbanner .ti { width:30px; height:30px; border-radius:9px; background:rgba(255,255,255,.18); display:grid; place-items:center; }
  .topbanner b { font-size:11.5px; font-weight:800; }
  .topbanner span { font-size:9.5px; color:rgba(255,255,255,.7); display:block; }
  .topbanner .q { margin-left:auto; font-size:10px; background:rgba(255,255,255,.16); padding:4px 9px; border-radius:999px; }
  .who { text-align:center; margin-top:26px; }
  .who .nm { font-size:30px; font-weight:900; }
  .who .st { font-size:13px; color:rgba(255,255,255,.78); margin-top:6px; }
  .who .timer { font-size:14px; font-weight:800; color:#f4a6d2; margin-top:14px; letter-spacing:1px; }
  .spacer { flex:1; }
  .wave { display:flex; align-items:center; justify-content:center; gap:4px; height:54px; margin-bottom:14px; }
  .wave i { width:4px; border-radius:4px; background:linear-gradient(180deg,#f4a6d2,#c4a0f0); }
  .caption { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(12px); border-radius:18px; padding:14px 16px; font-size:13.5px; line-height:1.55; text-align:center; }
  .controls { display:flex; justify-content:space-between; align-items:flex-end; margin:22px 6px 14px; }
  .ctrl { text-align:center; flex:1; }
  .ctrl .cb { width:54px; height:54px; border-radius:50%; margin:0 auto; background:rgba(255,255,255,.14); display:grid; place-items:center; font-size:20px; border:1px solid rgba(255,255,255,.12); }
  .ctrl.end .cb { width:64px; height:64px; background:#ff4d5e; box-shadow:0 10px 26px rgba(255,77,94,.5); }
  .ctrl b { display:block; font-size:10px; margin-top:7px; color:rgba(255,255,255,.82); font-weight:700; }
  .sendbar { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:11px 16px; font-size:12.5px; color:rgba(255,255,255,.75); }
  .tipline { text-align:center; font-size:10.5px; color:rgba(255,255,255,.6); margin-top:12px; }
</style>
</head>
<body class="screen">
<div class="phone">
  <div class="app dark">
    <div class="bgphoto"></div>
    <div class="statusbar on-photo" style="position:relative;z-index:3"></div>
    <div class="layer">
      <div class="topbanner">
        <span class="ti">🎙️</span>
        <div><b>AI 음성 통화 중</b><span>음성으로 더 깊은 대화를 나눠요</span></div>
        <span class="q">📶 음질 좋음</span>
      </div>

      <div class="who">
        <div class="nm">민준 <span style="font-size:22px">💜</span></div>
        <div class="st">음성 통화 중</div>
        <div class="timer">00:02:37</div>
      </div>

      <div class="spacer"></div>

      <div class="wave">
        <i style="height:14px"></i><i style="height:30px"></i><i style="height:20px"></i><i style="height:44px"></i>
        <i style="height:26px"></i><i style="height:50px"></i><i style="height:18px"></i><i style="height:38px"></i>
        <i style="height:24px"></i><i style="height:46px"></i><i style="height:16px"></i><i style="height:32px"></i>
        <i style="height:22px"></i><i style="height:40px"></i>
      </div>
      <div class="caption">오늘 하루 어땠어? 나랑 이야기하니까<br>조금은 더 좋은 하루였던 것 같아 😊</div>

      <div class="controls">
        <div class="ctrl"><div class="cb">🔇</div><b>음소거</b></div>
        <div class="ctrl"><div class="cb">🔊</div><b>스피커</b></div>
        <div class="ctrl end"><div class="cb">📞</div><b>통화 종료</b></div>
        <div class="ctrl"><div class="cb">🎚️</div><b>음성 변경</b></div>
        <div class="ctrl"><div class="cb">⋯</div><b>더보기</b></div>
      </div>

      <div class="sendbar">💬 대화 중 메시지 보내기 <span style="margin-left:auto">›</span></div>
      <p class="tipline">💡 팁 · 민준이와 자연스럽게 대화해보세요!</p>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
