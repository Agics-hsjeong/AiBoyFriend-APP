<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 3D 모델 뷰어</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background: radial-gradient(90% 50% at 50% 30%, #241a45 0%, #160f30 60%, #110b24 100%); color:var(--ink-on-dark); }
  .scrollbody { padding: 0 16px 18px; }
  .stage { position:relative; height:330px; margin: 4px 0; }
  .strip { position:absolute; top:6px; display:flex; flex-direction:column; gap:8px; z-index:2; }
  .strip.l { left:0; } .strip.r { right:0; }
  .strip .lbl { font-size:9px; color:var(--ink-on-dark-2); text-align:center; font-weight:700; margin-bottom:1px; }
  .th { width:46px; height:46px; border-radius:12px; background:var(--card-dark); border:1px solid var(--line-dark); display:grid; place-items:center; font-size:17px; }
  .th.on { border-color:var(--purple-400); box-shadow:0 0 14px rgba(167,139,250,.5); }
  .model { position:absolute; left:50%; top:18px; transform:translateX(-50%); width:150px; height:260px; }
  .model .fig { width:100%; height:230px; border-radius:24px; background:
      radial-gradient(60% 50% at 50% 30%, rgba(167,139,250,.25), transparent 60%),
      linear-gradient(160deg,#3a2c5e,#241a42); display:grid; place-items:center; color:rgba(255,255,255,.5); border:1px solid var(--line-dark); }
  .platform { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:140px; height:22px; border-radius:50%;
      background:radial-gradient(closest-side, rgba(167,139,250,.55), transparent); }
  .hint { text-align:center; font-size:10.5px; color:var(--ink-on-dark-2); margin:2px 0 14px; }
  .panel { background:var(--card-dark); border:1px solid var(--line-dark); border-radius:18px; padding:14px; }
  .panel .prow { display:flex; gap:12px; }
  .ctl { flex:1; }
  .ctl .ct { font-size:10px; color:var(--ink-on-dark-2); margin-bottom:8px; font-weight:700; }
  .joy { width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,.05); border:1px solid var(--line-dark); display:grid; place-items:center; margin:0 auto; position:relative; }
  .joy .nub { width:26px; height:26px; border-radius:50%; background:var(--grad-cta); }
  .joy .arrow { position:absolute; color:var(--ink-on-dark-2); font-size:10px; }
  .zoom { height:70px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; }
  .zoom .vbar { width:6px; flex:1; margin:6px 0; border-radius:999px; background:rgba(255,255,255,.08); position:relative; }
  .zoom .vbar b { position:absolute; left:50%; top:40%; transform:translate(-50%,-50%); width:16px; height:16px; border-radius:50%; background:var(--purple-400); }
  .bgs { display:flex; gap:7px; }
  .bgs .b { width:34px; height:34px; border-radius:10px; border:1px solid var(--line-dark); }
  .bgs .b.on { border-color:var(--purple-400); }
  .anim { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.05); border:1px solid var(--line-dark); border-radius:12px; padding:10px 12px; margin-top:12px; font-size:12px; }
  .anim .pl { width:24px; height:24px; border-radius:50%; background:var(--grad-cta); display:grid; place-items:center; font-size:11px; }
  .infos { display:flex; gap:10px; margin-top:12px; }
  .ic2 { flex:1; background:var(--card-dark); border:1px solid var(--line-dark); border-radius:14px; padding:12px; }
  .ic2 h4 { font-size:11px; font-weight:800; margin-bottom:7px; }
  .ic2 .ir { display:flex; justify-content:space-between; font-size:10.5px; color:var(--ink-on-dark-2); padding:2px 0; }
  .ic2 .ir b { color:#fff; font-weight:700; }
  .regen { display:flex; align-items:center; justify-content:center; gap:7px; height:46px; border-radius:14px; background:var(--grad-cta); color:#fff; font-weight:800; font-size:13px; margin-top:12px; box-shadow:var(--shadow-cta); }
</style>
</head>
<body class="screen">
<div class="phone scroll">
  <div class="app dark">
    <div class="statusbar on-dark"></div>
    <div class="appbar on-dark" style="justify-content:space-between"><span class="ab-btn">‹</span><span>3D 모델 뷰어 🧊</span><span style="font-size:12px;color:var(--ink-on-dark-2)">⤴ 공유</span></div>
    <div class="scrollbody">
      <div class="stage">
        <div class="strip l">
          <div class="lbl">표정</div>
          <div class="th on">😊</div><div class="th">🙂</div><div class="th">😌</div><div class="th">😉</div><div class="th">🥹</div>
        </div>
        <div class="model">
          <div class="fig"><svg width="50" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="6" r="3"/><path d="M9 10h6v9l-1 4h-1l-1-6-1 6h-1l-1-4z"/></svg></div>
          <div class="platform"></div>
        </div>
        <div class="strip r">
          <div class="lbl">포즈</div>
          <div class="th on">🧍</div><div class="th">👋</div><div class="th">🫰</div><div class="th">🙆</div><div class="th">🤔</div>
        </div>
      </div>
      <p class="hint">🖐️ 화면을 드래그하면 모델을 회전시킬 수 있어요</p>

      <div class="panel">
        <div class="prow">
          <div class="ctl">
            <div class="ct">모델 회전</div>
            <div class="joy"><span class="arrow" style="top:6px">▲</span><span class="arrow" style="bottom:6px">▼</span><span class="arrow" style="left:6px">◀</span><span class="arrow" style="right:6px">▶</span><span class="nub"></span></div>
          </div>
          <div class="ctl">
            <div class="ct">확대 / 축소</div>
            <div class="zoom">＋<div class="vbar"><b></b></div>－</div>
          </div>
          <div class="ctl">
            <div class="ct">배경</div>
            <div class="bgs">
              <div class="b on" style="background:linear-gradient(135deg,#3a2c5e,#241a42)"></div>
              <div class="b" style="background:linear-gradient(135deg,#2a3a5e,#1a2442)"></div>
              <div class="b" style="background:linear-gradient(135deg,#5e2c3a,#42221a)"></div>
            </div>
          </div>
        </div>
        <div class="anim"><span class="pl">▶</span> 애니메이션 · <b style="margin-left:2px">손인사</b> <span style="margin-left:auto;color:var(--ink-on-dark-2)">▾</span></div>
      </div>

      <div class="infos">
        <div class="ic2"><h4>📊 모델 정보</h4><div class="ir">폴리곤 <b>126,842</b></div><div class="ir">텍스처 <b>4K PBR</b></div><div class="ir">포맷 <b>GLB</b></div></div>
        <div class="ic2"><h4>✨ AI 생성 정보</h4><div class="ir">엔진 <b>Meshy</b></div><div class="ir">리깅 <b>완료</b></div><div class="ir">애니메이션 <b>12종</b></div></div>
      </div>

      <div class="regen">🔄 모델 재생성하기</div>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
