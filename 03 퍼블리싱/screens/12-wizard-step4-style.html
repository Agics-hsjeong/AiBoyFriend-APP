<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 위저드 STEP4 — 스타일</title>
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/wizard.css">
</head>
<body class="screen">
<div class="phone">
  <div class="app wiz">
    <div class="statusbar"></div>
    <div class="wiz-head"><span class="back">‹</span><span>이상형 생성하기 💜</span><span class="later">나중에</span></div>
    <div class="stepper" data-step="4"></div>

    <div class="wiz-scroll">
      <span class="tip">✨ AI 추천 스타일</span>
      <div class="steptag">STEP 4 / 7</div>
      <div class="qtitle">어떤 스타일이<br>가장 마음에 드나요? 💜</div>
      <p class="qsub">평소 즐겨 입는 스타일을 골라주세요</p>

      <div class="wiz-body">
        <div class="opts">
          <div class="opt-grid c2">
            <div class="opt v on"><div class="thumb photo" style="height:66px;background:#eceef1 url('../assets/img/style-casual.jpg') center 16%/cover"></div><div><b>캐주얼</b><span>편안하고 데일리한</span></div></div>
            <div class="opt v"><div class="thumb photo" style="height:66px;background:#eceef1 url('../assets/img/style-minimal.jpg') center 16%/cover"></div><div><b>미니멀</b><span>깔끔하고 단정한</span></div></div>
            <div class="opt v"><div class="thumb photo" style="height:66px;background:#eceef1 url('../assets/img/style-street.jpg') center 16%/cover"></div><div><b>스트릿</b><span>개성있고 트렌디한</span></div></div>
            <div class="opt v"><div class="thumb photo" style="height:66px;background:#eceef1 url('../assets/img/style-suit.jpg') center 16%/cover"></div><div><b>정장</b><span>격식있고 신뢰감</span></div></div>
            <div class="opt v"><div class="thumb photo" style="height:66px;background:#eceef1 url('../assets/img/style-smart.jpg') center 16%/cover"></div><div><b>스마트캐주얼</b><span>세련된 데일리</span></div></div>
            <div class="opt v"><div class="thumb photo" style="height:66px;background:#eceef1 url('../assets/img/style-sport.jpg') center 16%/cover"></div><div><b>스포츠</b><span>활동적인 애슬레저</span></div></div>
          </div>

        </div>

        <div class="preview">
          <div class="pphoto photo body"></div>
          <div class="pcard">
            <h4>👕 캐주얼 미리보기</h4>
            <div class="feat-row"><span class="d"></span> 편안한 핏</div>
            <div class="feat-row"><span class="d"></span> 데일리 무드</div>
            <div class="dots" style="justify-content:flex-start;margin-top:8px">
              <i style="background:var(--purple-400);width:18px"></i>
              <i style="background:var(--purple-200)"></i>
              <i style="background:var(--purple-200)"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="footnote">💡 선택한 스타일은 다양한 의상으로 표현돼요<span class="count">4 / 7</span></div>
    </div>

    <div class="wiz-foot">
      <button class="prev">이전</button>
      <button class="next btn-cta">다음 ›</button>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
