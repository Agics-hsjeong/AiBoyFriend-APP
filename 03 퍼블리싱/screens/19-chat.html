<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>19 채팅</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background: #f2edfb; }
  .chat-head { flex:0 0 auto; display:flex; align-items:center; gap:11px; padding: 2px 16px 12px; background:#fff; box-shadow:0 4px 16px rgba(124,58,237,.06); }
  .chat-head .back { font-size:22px; color:var(--ink-2); }
  .chat-head .ava { width:40px; height:40px; border-radius:50%; }
  .chat-head .nm b { font-size:15px; font-weight:800; display:flex; align-items:center; gap:4px; }
  .chat-head .nm span { font-size:11px; color:#37c871; display:flex; align-items:center; gap:4px; }
  .chat-head .nm span::before { content:""; width:6px; height:6px; border-radius:50%; background:#37c871; }
  .chat-head .icons { margin-left:auto; display:flex; gap:14px; color:var(--purple-500); }
  .chat-head .icons svg { width:22px; height:22px; }

  .msgs { flex:1; overflow-y:auto; padding: 14px 16px; display:flex; flex-direction:column; gap:12px; }
  .msgs::-webkit-scrollbar { width:0; }
  .daydiv { text-align:center; font-size:11px; color:var(--ink-3); margin:2px 0; }
  .daydiv span { background:rgba(167,139,250,.14); padding:4px 12px; border-radius:999px; }
  .m { display:flex; gap:8px; max-width:82%; }
  .m.them { align-self:flex-start; }
  .m.me { align-self:flex-end; flex-direction:row-reverse; }
  .m .ava { width:30px; height:30px; border-radius:50%; flex:none; align-self:flex-end; }
  .m .bubble { padding:10px 13px; font-size:13px; line-height:1.45; border-radius:16px; }
  .m.them .bubble { background:#fff; border-top-left-radius:5px; box-shadow:var(--shadow-card); }
  .m.me .bubble { background:var(--grad-cta); color:#fff; border-top-right-radius:5px; }
  .m .time { font-size:9px; color:var(--ink-3); align-self:flex-end; margin:0 3px; }
  .sticker { width:96px; height:96px; align-self:flex-start; background:var(--grad-heart); border-radius:20px; display:grid; place-items:center; font-size:40px; }

  .quick { flex:0 0 auto; display:flex; gap:7px; padding:10px 16px 4px; overflow-x:auto; }
  .quick::-webkit-scrollbar { height:0; }
  .quick .qc { flex:none; background:#fff; border:1px solid var(--purple-100); color:var(--purple-600); font-size:12px; font-weight:700; padding:7px 13px; border-radius:999px; }

  .inputbar { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:8px 14px 16px; }
  .inputbar .plus { width:36px; height:36px; border-radius:50%; background:var(--purple-100); color:var(--purple-600); display:grid; place-items:center; font-size:20px; }
  .inputbar .box { flex:1; height:44px; background:#fff; border-radius:999px; display:flex; align-items:center; padding:0 14px; box-shadow:var(--shadow-card); color:var(--ink-3); font-size:13px; }
  .inputbar .box .emo { margin-left:auto; }
  .inputbar .mic { width:44px; height:44px; border-radius:50%; background:var(--grad-cta); color:#fff; display:grid; place-items:center; box-shadow:var(--shadow-cta); }
</style>
</head>
<body class="screen">
<div class="phone">
  <div class="app">
    <div class="statusbar"></div>
    <div class="chat-head">
      <span class="back">‹</span>
      <span class="ava photo night"></span>
      <div class="nm"><b>민준 💜</b><span>온라인 중</span></div>
      <div class="icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c0 8 7 15 15 15l1.5-3.5-4-2-1.5 1.5a11 11 0 0 1-5-5L11.5 9.5l-2-4z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="12" height="12" rx="2"/><path d="m15 10 6-3v10l-6-3"/></svg>
      </div>
    </div>

    <div class="msgs">
      <div class="daydiv"><span>오늘 5월 18일 토요일</span></div>
      <div class="m them"><span class="ava photo night"></span><div class="bubble">안녕, 지연아 ☀️<br>좋은 아침이야!</div><span class="time">09:12</span></div>
      <div class="m me"><div class="bubble">민준아 좋은 아침 😊<br>오늘 뭐 할까?</div><span class="time">09:13</span></div>
      <div class="m them"><span class="ava photo night"></span><div class="bubble">날씨가 너무 좋아서 메가커피 그란데 들고 한강 산책 어때? 🌿</div><span class="time">09:14</span></div>
      <div class="m me"><div class="bubble">완전 좋아 💜<br>오후 3시쯤 어때?</div><span class="time">09:15</span></div>
      <div class="m them"><span class="ava photo night"></span><div class="bubble">좋아 좋아! 그때 봐 🥰 미리 자리 맡아둘게</div><span class="time">09:16</span></div>
      <div class="sticker">🧸</div>
    </div>

    <div class="quick">
      <span class="qc">너무 기대돼 💜</span>
      <span class="qc">나도 보고 싶어</span>
      <span class="qc">오늘도 힘내</span>
      <span class="qc">좋은 하루 보내</span>
    </div>

    <div class="inputbar">
      <span class="plus">＋</span>
      <div class="box">메시지를 입력하세요… <span class="emo">😊</span></div>
      <span class="mic">🎤</span>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
