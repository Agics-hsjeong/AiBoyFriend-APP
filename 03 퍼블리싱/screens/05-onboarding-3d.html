<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05 온보딩 — 3D 생성</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background: radial-gradient(120% 80% at 50% 0%, #efe9fb 0%, #f3f0fb 60%); }
  .wrap { flex: 1; display: flex; flex-direction: column; padding: 0 26px 26px; }
  .counter { font-weight: 800; color: var(--purple-400); font-size: 15px; margin-top: 6px; }
  h1 { font-size: 26px; font-weight: 900; line-height: 1.32; margin-top: 10px; letter-spacing: -.4px; }
  .sub { color: var(--ink-2); font-size: 13.5px; line-height: 1.6; margin-top: 10px; }
  .body { display: flex; gap: 14px; margin-top: 16px; flex: 1; }
  .feats { display: flex; flex-direction: column; gap: 10px; flex: 0 0 47%; }
  .feat { background:#fff; border:1px solid var(--line); border-radius: 14px; padding: 11px; box-shadow: var(--shadow-card); }
  .feat .fi { width: 34px; height: 34px; border-radius: 10px; background: var(--purple-100); display:grid; place-items:center; font-size: 16px; margin-bottom: 6px; }
  .feat b { font-size: 12.5px; font-weight: 800; }
  .feat span { display:block; font-size: 10.5px; color: var(--ink-3); margin-top: 2px; line-height: 1.4; }
  .viewer { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .model { flex: 1; border-radius: 20px; position: relative; overflow: hidden; }
  .model .photo { position:absolute; inset:0; }
  .glow { position:absolute; left:50%; bottom:10px; transform:translateX(-50%); width:80%; height:14px; background: radial-gradient(closest-side, rgba(167,139,250,.6), transparent); }
  .thumbs { display:flex; gap: 8px; }
  .thumbs .photo { flex:1; height: 56px; border-radius: 12px; }
  .dots { margin: 16px 0 14px; }
  .dots > i { background: var(--purple-200); }
  .dots > i.on { background: var(--purple-400); }
</style>
</head>
<body class="screen">
<div class="phone">
  <div class="app">
    <div class="statusbar"></div>
    <div class="wrap">
      <div class="counter">05 / 06</div>
      <h1>AI 이미지부터<br><span class="grad-text">3D 모델</span>까지 완벽하게</h1>
      <p class="sub">AI가 상상한 모습을 현실로 만들고<br>다양한 각도에서 만나보세요</p>

      <div class="body">
        <div class="feats">
          <div class="feat"><div class="fi">🖼️</div><b>AI 이미지 생성</b><span>이상형을 사진으로</span></div>
          <div class="feat"><div class="fi">🧊</div><b>3D 모델 생성</b><span>Meshy 기반 자동 변환</span></div>
          <div class="feat"><div class="fi">🔄</div><b>360° 뷰어</b><span>모든 각도로 회전</span></div>
          <div class="feat"><div class="fi">😊</div><b>모션 & 표정</b><span>포즈·표정 변경</span></div>
        </div>
        <div class="viewer">
          <div class="model card">
            <div class="photo"><svg class="ava-svg" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4.2"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7z"/></svg></div>
            <div class="glow"></div>
          </div>
          <div class="thumbs">
            <div class="photo"></div><div class="photo"></div><div class="photo"></div>
          </div>
        </div>
      </div>

      <div class="dots"><i></i><i></i><i></i><i></i><i class="on"></i><i></i></div>
      <button class="btn-cta">다음</button>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
