<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 온보딩 — 시작하기</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background: radial-gradient(120% 80% at 50% 0%, #efe5fb 0%, #f3f0fb 60%); }
  html[data-theme="dark"] .app { background: radial-gradient(120% 80% at 50% 0%, #2a1c48 0%, #140e2b 60%); }
  html[data-theme="dark"] .fb, html[data-theme="dark"] .mini { background: var(--surface); border-color: var(--line); }
  .wrap { flex: 1; display: flex; flex-direction: column; padding: 0 26px 26px; }
  .counter { font-weight: 800; color: var(--purple-400); font-size: 15px; margin-top: 6px; }
  h1 { font-size: 26px; font-weight: 900; line-height: 1.32; margin-top: 10px; letter-spacing: -.4px; }
  .sub { color: var(--ink-2); font-size: 13.5px; line-height: 1.6; margin-top: 10px; }
  .portal { position: relative; height: 230px; margin: 12px 0; display:grid; place-items:center; }
  .gate {
    width: 150px; height: 200px; border-radius: 80px 80px 26px 26px;
    background: radial-gradient(60% 70% at 50% 40%, rgba(244,160,210,.35), transparent 70%);
    border: 2px solid rgba(196,160,240,.5); box-shadow: 0 0 60px rgba(196,160,240,.5) inset, 0 20px 50px rgba(196,160,240,.4);
    display:grid; place-items:center;
  }
  .gate .core { width: 78px; height: 72px; background: var(--grad-heart); border-radius: 50%; display:grid; place-items:center; box-shadow:0 14px 36px rgba(244,160,210,.6); }
  .gate .core .heart { width: 40px; height: 36px; background:#fff; }
  .gate .label { position:absolute; top:38px; font-size: 11px; color: var(--purple-500); font-weight: 800; text-align:center; }
  .fb { position:absolute; background:#fff; border:1px solid var(--line); border-radius: 12px; padding: 7px 11px; font-size: 11px; font-weight: 800; box-shadow: var(--shadow-card); }
  .minis { display:flex; gap: 8px; }
  .mini { flex:1; background:#fff; border:1px solid var(--line); border-radius: 14px; padding: 11px 6px; text-align:center; box-shadow: var(--shadow-card); }
  .mini .mi { font-size: 19px; }
  .mini b { display:block; font-size: 10.5px; font-weight: 800; margin-top: 4px; line-height:1.3; }
  .closing { text-align:center; font-size: 13px; color: var(--ink-2); margin: 16px 0; line-height: 1.6; }
  .closing b { color: var(--ink); font-weight: 800; }
  .dots { margin: 0 0 14px; }
  .dots > i { background: var(--purple-200); }
  .dots > i.on { background: var(--purple-400); }
</style>
</head>
<body class="screen">
<div class="phone">
  <div class="app">
    <div class="statusbar"></div>
    <div class="wrap">
      <div class="counter">06 / 06</div>
      <h1>이제, 당신만의<br><span class="grad-text">AI 남자친구</span>를 만나보세요</h1>
      <p class="sub">당신의 이상형에 특별한 설렘과<br>따뜻한 연결을 선물할게요</p>

      <div class="portal">
        <div class="fb" style="left:6px;top:30px">💬 대화하고</div>
        <div class="fb" style="right:4px;top:18px">🧠 기억하고</div>
        <div class="fb" style="left:0;bottom:36px">💕 함께하고</div>
        <div class="fb" style="right:0;bottom:24px">✨ 만들어가요</div>
        <div class="gate">
          <div class="label">당신만을 위한<br>특별한 연결</div>
          <div class="core"><span class="heart"></span></div>
        </div>
      </div>

      <div class="minis">
        <div class="mini"><div class="mi">💬</div><b>24시간<br>대화</b></div>
        <div class="mini"><div class="mi">🧠</div><b>AI 기억<br>시스템</b></div>
        <div class="mini"><div class="mi">📍</div><b>데이트<br>& 일상</b></div>
        <div class="mini"><div class="mi">🧊</div><b>3D 모델<br>생성</b></div>
      </div>

      <p class="closing">지금 바로 시작하고<br><b>설레는 이야기를 만들어보세요 💜</b></p>

      <div class="dots" style="margin-top:auto"><i></i><i></i><i></i><i></i><i></i><i class="on"></i></div>
      <button class="btn-cta">시작하기</button>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
