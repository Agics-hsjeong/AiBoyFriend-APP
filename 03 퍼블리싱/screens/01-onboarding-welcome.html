<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 온보딩 — 환영</title>
<link rel="stylesheet" href="../css/app.css">
<style>
  .app { background:#0b0e2c; color:#fff; }
  /* 배경 3밴드: 하늘 그라데 → 사진 → 하단 다크 (이음새 색 일치) */
  .bg { position:absolute; inset:0; z-index:0; display:flex; flex-direction:column; }
  .bg .sky { height:35%; background:linear-gradient(180deg,#0b0e2c 0%,#1b1e4f 34%,#45447e 72%,#7f66aa 100%); position:relative; }
  .bg .scene { height:40%; background:#5a4a86 url('../assets/img/ob01-scene.jpg') center 42%/cover; }
  .bg .darkb { flex:1; background:linear-gradient(180deg,#151328 0%,#0c0d1c 55%,#080910 100%); }
  .stars i { position:absolute; width:2px; height:2px; border-radius:50%; background:#fff; opacity:.85; }

  .wrap { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; padding:0 24px 28px; }
  .heart3d { width:60px; height:54px; margin:6px auto 0; background:linear-gradient(150deg,#cbb4f7,#f0a6d8);
    box-shadow:0 12px 34px rgba(220,150,220,.55), 0 0 24px rgba(200,150,240,.5); transform:rotate(-7deg);
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21s-7.5-4.7-10-9.3C.3 8.4 1.9 4.8 5.4 4.3 7.7 4 9.6 5.2 12 7.9c2.4-2.7 4.3-3.9 6.6-3.6 3.5.5 5.1 4.1 3.4 7.4C19.5 16.3 12 21 12 21z'/></svg>") center/contain no-repeat;
    mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21s-7.5-4.7-10-9.3C.3 8.4 1.9 4.8 5.4 4.3 7.7 4 9.6 5.2 12 7.9c2.4-2.7 4.3-3.9 6.6-3.6 3.5.5 5.1 4.1 3.4 7.4C19.5 16.3 12 21 12 21z'/></svg>") center/contain no-repeat; }
  h1 { font-size:31px; font-weight:900; text-align:center; margin-top:16px; letter-spacing:-.5px; text-shadow:0 4px 20px rgba(0,0,0,.3); }
  h1 .ai { background:linear-gradient(135deg,#c4a6f5,#f3a6d6); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { text-align:center; margin-top:16px; font-size:15px; line-height:1.6; color:rgba(255,255,255,.92); font-weight:500; text-shadow:0 2px 10px rgba(0,0,0,.3); }

  .feats { display:flex; gap:6px; margin-top:auto; }
  .feat { flex:1; text-align:center; padding:0 4px; }
  .feat .badge { width:52px; height:52px; margin:0 auto 11px; border-radius:50%; position:relative;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(8px);
    display:grid; place-items:center; box-shadow:0 6px 18px rgba(120,80,180,.3); }
  .feat .badge .hi { width:24px; height:22px; background:linear-gradient(150deg,#d9c4ff,#f3b6df);
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21s-7.5-4.7-10-9.3C.3 8.4 1.9 4.8 5.4 4.3 7.7 4 9.6 5.2 12 7.9c2.4-2.7 4.3-3.9 6.6-3.6 3.5.5 5.1 4.1 3.4 7.4C19.5 16.3 12 21 12 21z'/></svg>") center/contain no-repeat;
    mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21s-7.5-4.7-10-9.3C.3 8.4 1.9 4.8 5.4 4.3 7.7 4 9.6 5.2 12 7.9c2.4-2.7 4.3-3.9 6.6-3.6 3.5.5 5.1 4.1 3.4 7.4C19.5 16.3 12 21 12 21z'/></svg>") center/contain no-repeat; }
  .feat .badge .em { font-size:21px; }
  .feat .badge .dot { position:absolute; right:6px; top:6px; font-size:11px; }
  .feat b { font-size:12px; font-weight:800; display:block; }
  .feat span { font-size:10px; color:rgba(255,255,255,.6); line-height:1.45; display:block; margin-top:5px; }
  .dots { margin:24px 0 18px; }
  .dots > i { background:rgba(255,255,255,.32); }
  .dots > i.on { background:#c79af0; width:20px; }
  .cta { display:flex; align-items:center; justify-content:center; height:56px; border-radius:18px; font-size:17px; font-weight:800; color:#fff;
    background:linear-gradient(135deg,#c8a3ef 0%,#dd9fd0 55%,#ef9ec5 100%); box-shadow:0 14px 30px rgba(210,140,200,.45); }
</style>
</head>
<body class="screen">
<div class="phone">
  <div class="app">
    <div class="bg">
      <div class="sky">
        <div class="stars">
          <i style="top:38px;left:40px"></i><i style="top:66px;left:300px"></i><i style="top:90px;left:90px"></i>
          <i style="top:54px;left:210px"></i><i style="top:110px;left:330px"></i><i style="top:130px;left:30px"></i><i style="top:80px;left:160px"></i>
        </div>
      </div>
      <div class="scene"></div>
      <div class="darkb"></div>
    </div>

    <div class="wrap">
      <div class="statusbar on-dark"></div>
      <div class="heart3d"></div>
      <h1>내 남자친구는 <span class="ai">AI</span></h1>
      <p class="sub">당신이 만든 이상형이<br>진짜 남자친구가 됩니다</p>

      <div class="feats">
        <div class="feat">
          <div class="badge"><span class="hi"></span></div>
          <b>당신만을 이해하는 AI</b>
          <span>대화를 나눌수록<br>당신을 더 잘 이해해요</span>
        </div>
        <div class="feat">
          <div class="badge"><span class="em">💬</span><span class="dot">💗</span></div>
          <b>함께하는 특별한 일상</b>
          <span>채팅, 통화, 데이트까지<br>모든 순간을 함께해요</span>
        </div>
        <div class="feat">
          <div class="badge"><span class="em">🧊</span><span class="dot">💗</span></div>
          <b>AI 이미지 & 3D 모델</b>
          <span>AI 이미지로 만들고<br>3D 모델까지 만나보세요</span>
        </div>
      </div>

      <div class="dots"><i class="on"></i><i></i><i></i><i></i><i></i></div>
      <button class="cta">다음</button>
    </div>
  </div>
</div>
<script src="../assets/ui.js"></script>
</body>
</html>
